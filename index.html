<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balaji General Shop</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f3efe6;
}

/* Header */
header {
    background: linear-gradient(90deg, #7b3f00, #c68642);
    color: white;
    padding: 20px;
    text-align: center;
}

/* Hero Section */
.hero {
    background: url('https://images.unsplash.com/photo-1607082350899-7e105aa886ae');
    background-size: cover;
    background-position: center;
    padding: 100px 20px;
    color: white;
    text-align: center;
}

.hero h1 {
    font-size: 40px;
}

/* Products */
.products {
    padding: 30px;
    text-align: center;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px;
    display: inline-block;
    width: 220px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* Footer */
footer {
    background: #3b2f2f;
    color: white;
    text-align: center;
    padding: 20px;
}

/* WhatsApp Button */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
}

.whatsapp a {
    background: #25D366;
    color: white;
    padding: 15px 18px;
    border-radius: 50%;
    text-decoration: none;
    font-size: 20px;
}
</style>
</head>

<body>

<header>
<h1>Balaji General Shop 🛒</h1>
<p>Owner: Bala Ji</p>
</header>

<div class="hero">
<h1>Sabhi Ration Items Ek Hi Jagah</h1>
<p>Best Quality | Lowest Price</p>
</div>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
<h3>Rice</h3>
<p>Premium Quality</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
<h3>Wheat</h3>
<p>Fresh & Clean</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1625944525533-473f1b2c5a1c">
<h3>Cooking Oil</h3>
<p>Best Price</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<h3>Spices</h3>
<p>Pure & Natural</p>
</div>

</section>

<footer>
<p>© 2026 Balaji General Shop</p>
<p>Serving Quality Since 2026</p>
</footer>

<!-- WhatsApp (hidden number, only button works) -->
<div class="whatsapp">
<a href="https://wa.me/919109229366" target="_blank">💬</a>
</div>

</body>
</html>
